<!DOCTYPE html>
<html>
<head>
<title>Language Detector</title>
<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

.container {
    margin-top: 100px;
}

textarea {
    width: 300px;
    height: 100px;
}

button {
    padding: 10px 20px;
}

.result {
    font-size: 20px;
    margin-top: 20px;
}

.message {
    color: green;
}
</style>
</head>

<body>

<div class="container">

<h1>Language Detection App</h1>

<textarea id="text" placeholder="Enter text here"></textarea><br><br>

<button onclick="detect()">Detect Language</button>

<div class="result" id="result"></div>
<div class="message" id="message"></div>

</div>

<script>
async function detect(){

let text = document.getElementById("text").value

let res = await fetch("/detect",{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({text:text})
})

let data = await res.json()

document.getElementById("result").innerText =
"Language Detected: " + data.language

document.getElementById("message").innerText =
data.message
}
</script>

</body>
</html>
